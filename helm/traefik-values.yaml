# Traefik values
service:
  type: LoadBalancer
  annotations:
    load-balancer.hetzner.cloud/location: hel1

ports:
  web:
    port: 80
  websecure:
    port: 443

additionalArguments:
  - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
  - "--entrypoints.web.http.redirections.entrypoint.scheme=https"

ingressRoute:
  dashboard:
    enabled: false