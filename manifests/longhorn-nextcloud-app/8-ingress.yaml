---
# Traefik Middleware — security headers for Nextcloud
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: nextcloud-headers
  namespace: nextcloud
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
    customResponseHeaders:
      Strict-Transport-Security: "max-age=15552000; includeSubDomains"
      X-Content-Type-Options: "nosniff"
      X-Frame-Options: "SAMEORIGIN"
      X-XSS-Protection: "1; mode=block"
      Referrer-Policy: "no-referrer"

---
# Ingress — Traefik + cert-manager
# Prerequisites:
# 1. cert-manager installed with letsencrypt-prod ClusterIssuer
# 2. DNS A record: nextcloud1.example.com → Hetzner Load Balancer IP
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nextcloud-ingress
  namespace: nextcloud
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: "nextcloud-nextcloud-headers@kubernetescrd"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - "nextcloud1.example.com"
      secretName: nextcloud-tls
  rules:
    - host: "nextcloud1.example.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextcloud
                port:
                  number: 80